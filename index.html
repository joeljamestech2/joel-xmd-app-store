<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Joel App Store - Neon Edition</title>

<style>
:root {
    --cyan: #35eaff;
    --pink: #ff0a6c;
    --bg-main: #121214;
    --bg-card: #1a1a24;
    --text-main: #ffffff;
    --text-sub: #888894;
    --border-color: #2a2a35;
    --font-mono: 'Fira Code', monospace;
    --font-sans: 'Segoe UI', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-sans);
    overflow: hidden;
}

/* LOGIN */
#login-view {
    position:fixed; inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background: var(--bg-main);
    z-index:1000;
}

.login-box {
    width:180px;
    height:55px;
    border-radius:30px;
    background:var(--bg-main);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:0.5s;
}

.login-box.expanded {
    width:350px;
    height:420px;
    border-radius:15px;
}

.login-box::before {
    content:"";
    position:absolute;
    inset:50%;
    width:800px;
    height:800px;
    transform:translate(-50%,-50%);
    background:conic-gradient(var(--cyan),var(--pink),var(--cyan));
    animation:spin 5s linear infinite;
}

@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg);} }

.inner-content {
    position:absolute;
    inset:3px;
    background:var(--bg-card);
    border-radius:inherit;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}

.header {
    font-family:var(--font-mono);
    margin-top:10px;
}

.form-container {
    width:100%;
    display:flex;
    flex-direction:column;
    gap:15px;
    opacity:0;
    visibility:hidden;
}

.login-box.expanded .form-container {
    opacity:1;
    visibility:visible;
}

input {
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border-color);
    background:var(--bg-main);
    color:white;
}

button {
    padding:12px;
    background:var(--cyan);
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* APP */
#app-view { display:none; opacity:0; transition:0.5s; }

nav {
    display:flex;
    padding:15px;
    border-bottom:1px solid var(--border-color);
}

nav h1 { font-family:var(--font-mono); }

.search-bar-container {
    position:relative;
}

#search-input {
    width:100%;
    padding:12px;
    margin:20px 0;
}

.app-item {
    display:flex;
    align-items:center;
    padding:10px;
    background:var(--bg-card);
    margin-bottom:10px;
    border-radius:10px;
}

.app-icon {
    width:50px;
    height:50px;
    margin-right:10px;
}

.app-action-btn {
    margin-left:auto;
    background:transparent;
    border:1px solid var(--cyan);
    color:var(--cyan);
    padding:6px 12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-view">
<div class="login-box" id="loginBox" onclick="expandLogin()">
<div class="inner-content">

<div class="header">LOGIN 🔒</div>

<form class="form-container" onsubmit="handleLogin(event)">
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<button type="submit">ENTER</button>

<div style="font-size:12px;margin-top:10px;">
<a href="#" onclick="toggleSignup(event)">Sign up</a>
</div>

</form>

</div>
</div>
</div>

<!-- APP -->
<div id="app-view">

<nav>
<h1>JOEL APP STORE</h1>
</nav>

<main>
<input id="search-input" placeholder="Search apps...">

<div id="results"></div>
</main>

</div>

<script>
// LOGIN BOX
let expanded=false;
function expandLogin(){
if(!expanded){
document.getElementById("loginBox").classList.add("expanded");
expanded=true;
}
}
setTimeout(expandLogin,3000);

// AUTH
let isSignup=false;

function toggleSignup(e){
e.preventDefault();
isSignup=!isSignup;

document.querySelector(".form-container").innerHTML = isSignup ? `
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>
<button type="submit">CREATE ACCOUNT</button>
<div><a href="#" onclick="toggleSignup(event)">Back</a></div>
` : location.reload();
}

function saveUser(u,p){
let users=JSON.parse(localStorage.getItem("users")||"[]");
users.push({u,p});
localStorage.setItem("users",JSON.stringify(users));
}

function validateUser(u,p){
let users=JSON.parse(localStorage.getItem("users")||"[]");
return users.find(x=>x.u===u && x.p===p);
}

function handleLogin(e){
e.preventDefault();
let i=e.target.querySelectorAll("input");
let u=i[0].value;
let p=i[1].value;

if(isSignup){
let c=i[2].value;
if(p!==c){alert("No match");return;}
saveUser(u,p);
alert("Created");
location.reload();
return;
}

if(!validateUser(u,p)){alert("Wrong login");return;}

document.getElementById("login-view").style.display="none";
document.body.style.overflow="auto";

let app=document.getElementById("app-view");
app.style.display="block";
setTimeout(()=>app.style.opacity="1",50);
}

// SEARCH + API
let search=document.getElementById("search-input");
let results=document.getElementById("results");

search.addEventListener("input",async e=>{
let q=e.target.value;
if(!q) return results.innerHTML="";

let data=await fetchApps(q);
render(data);
});

async function fetchApps(q){
try{
let r=await fetch(`https://apis.davidcyril.name.ng/endpoints/download/apk?query=${q}`);
let d=await r.json();
if(!d.status) return [];

return [{
name:d.apk.name,
subtitle:d.apk.package,
icon:d.apk.icon,
downloadLink:d.apk.downloadLink
}];
}catch(e){return [];}
}

function render(apps){
results.innerHTML="";
apps.forEach(a=>{
let div=document.createElement("div");
div.className="app-item";
div.dataset.download=a.downloadLink;

div.innerHTML=`
<img src="${a.icon}" class="app-icon">
<div>
<div>${a.name}</div>
<small>${a.subtitle}</small>
</div>
<button class="app-action-btn" onclick="downloadApp(event)">GET</button>
`;

results.appendChild(div);
});
}

function downloadApp(e){
let btn=e.target;
let link=btn.closest(".app-item").dataset.download;

btn.innerText="DOWNLOADING...";
window.open(link,"_blank");

setTimeout(()=>btn.innerText="DONE",1500);
}
</script>

</body>
</html>
