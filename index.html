<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joel App Store - Neon Edition</title>
    <style>
        /* --- GLOBAL & NEON VARIABLES --- */
        :root {
            --cyan: #35eaff;
            --pink: #ff0a6c;
            --bg-main: #121214;
            --bg-card: #1a1a24;
            --text-main: #ffffff;
            --text-sub: #888894;
            --border-color: #2a2a35;
            --font-mono: 'Fira Code', Consolas, 'Courier New', monospace;
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevents scrolling while on login screen */
            transition: background-color 0.5s;
        }

        /* =========================================
           LOGIN SCREEN STYLES
           ========================================= */
        #login-view {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background-color: var(--bg-main);
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .login-box {
            position: relative;
            width: 180px;
            height: 55px;
            border-radius: 30px;
            background: var(--bg-main);
            transition: all 0.6s cubic-bezier(0.83, 0, 0.17, 1);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            cursor: pointer;
        }

        .login-box.expanded {
            width: 350px;
            height: 420px;
            border-radius: 15px;
            cursor: default;
        }

        .login-box::before {
            content: "";
            position: absolute;
            inset: 50%;
            width: 800px;
            height: 800px;
            translate: -50% -50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg 36deg, var(--cyan) 36deg 48deg,
                transparent 48deg 126deg, var(--pink) 126deg 138deg,
                transparent 138deg 216deg, var(--cyan) 216deg 228deg,
                transparent 228deg 306deg, var(--pink) 306deg 318deg,
                transparent 318deg 360deg
            );
            filter: blur(1px);
            animation: neon-rotate 5s linear infinite;
        }

        @keyframes neon-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .inner-content {
            position: absolute;
            inset: 3px;
            background: var(--bg-card);
            border-radius: inherit;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 30px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-top: 0px;
            transition: all 0.5s ease;
            height: 55px;
            font-family: var(--font-mono);
        }

        .header .lock { color: var(--cyan); font-size: 14px; }
        .header .dot { color: var(--pink); font-size: 20px; line-height: 0; }

        .login-box.expanded .header {
            margin-top: 15px;
            margin-bottom: 25px;
            height: auto;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 20px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .login-box.expanded .form-container {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            transition-delay: 0.3s;
        }

        .form-container input {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: var(--font-mono);
        }

        .form-container input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(53, 234, 255, 0.2);
        }

        .form-container button {
            background: var(--cyan);
            color: var(--bg-main);
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }

        .form-container button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(53, 234, 255, 0.4);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .footer-links a { text-decoration: none; color: var(--text-sub); transition: color 0.3s; }
        .footer-links a:hover { color: white; }
        .footer-links a.signup { color: var(--pink); }
        .footer-links a.signup:hover { color: #ff3b86; text-shadow: 0 0 8px var(--pink); }

        /* =========================================
           APP STORE STYLES (NEON THEME)
           ========================================= */
        #app-view {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            fill: var(--cyan);
            margin-right: 15px;
            cursor: pointer;
            filter: drop-shadow(0 0 5px var(--cyan));
        }

        nav h1 {
            font-size: 18px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            font-family: var(--font-mono);
        }
        
        nav h1 span { color: var(--pink); }

        /* Main Container */
        main {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-header {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -1px;
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(53, 234, 255, 0.3);
        }

        /* Search Bar */
        .search-bar-container { position: relative; margin-bottom: 30px; }
        .search-bar-container svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; fill: var(--text-sub); transition: fill 0.3s;
        }

        #search-input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            font-size: 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            outline: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        #search-input:focus {
            border-color: var(--pink);
            box-shadow: 0 0 15px rgba(255, 10, 108, 0.2);
        }

        #search-input:focus + svg { fill: var(--pink); }
        #search-input::placeholder { color: var(--text-sub); }

        /* Discover Section */
        #discover-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: white; }
        .discover-tags { display: flex; flex-direction: column; gap: 10px; }
        
        .tag {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            color: var(--cyan);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(53, 234, 255, 0.15);
            transform: translateX(5px);
        }

        .tag svg { width: 16px; height: 16px; margin-right: 10px; fill: var(--pink); }

        /* App List Section */
        #results-section { display: none; }
        .app-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .app-item:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(53, 234, 255, 0.1);
        }

        .app-icon {
            width: 64px; height: 64px;
            border-radius: 14px;
            object-fit: cover;
            margin-right: 15px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
        }

        .app-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .app-title {
            font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px;
        }
        .app-subtitle { font-size: 13px; color: var(--text-sub); }

        .app-action-btn {
            background-color: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            border-radius: 20px;
            padding: 7px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        .app-action-btn:hover {
            background-color: var(--cyan);
            color: var(--bg-main);
            box-shadow: 0 0 12px var(--cyan);
        }

        .app-action-btn:active { transform: scale(0.95); }

        .loader {
            text-align: center; padding: 20px;
            color: var(--pink); font-family: var(--font-mono); font-size: 14px;
            display: none;
            text-shadow: 0 0 8px rgba(255, 10, 108, 0.5);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-box" id="loginBox" onclick="expandLogin()">
            <div class="inner-content">
                <div class="header">
                    <span class="dot">•</span> LOGIN <span class="lock">🔒</span>
                </div>
                
                <form class="form-container" onsubmit="handleLogin(event)">
                    <input type="text" placeholder="Username" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit">Access System</button>
                    
                    <div class="footer-links">
                        <a href="#">Forgot Password</a>
                        <a href="#" class="signup">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="app-view">
        <nav>
            <svg class="menu-icon" viewBox="0 0 24 24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
            <h1>JOEL <span>APP STORE</span></h1>
        </nav>

        <main>
            <h1 class="search-header">Search</h1>
            
            <div class="search-bar-container">
                <input type="text" id="search-input" placeholder="Games, Apps, Stories..." autocomplete="off">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>

            <section id="discover-section">
                <h2>Discover</h2>
                <div class="discover-tags">
                    <div class="tag" onclick="triggerSearch('house design')">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        house design
                    </div>
                    <div class="tag" onclick="triggerSearch('live wallpaper')">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        live wallpaper
                    </div>
                    <div class="tag" onclick="triggerSearch('music player')">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        music player
                    </div>
                </div>
            </section>

            <div id="loader" class="loader">Querying Network...</div>
            <section id="results-section"></section>
        </main>
    </div>

    <script>
        // --- LOGIN LOGIC ---
        const loginBox = document.getElementById('loginBox');
        let expanded = false;

        function expandLogin() {
            if (!expanded) {
                loginBox.classList.add('expanded');
                expanded = true;
            }
        }

        // Auto-expand after 4 seconds
        setTimeout(expandLogin, 4000);

        function handleLogin(e) {
            e.preventDefault(); // Prevent page reload
            
            // Fade out login view
            const loginView = document.getElementById('login-view');
            loginView.style.opacity = '0';
            
            setTimeout(() => {
                loginView.style.visibility = 'hidden';
                loginView.style.display = 'none';
                
                // Allow scrolling again and show app view
                document.body.style.overflow = 'auto';
                const appView = document.getElementById('app-view');
                appView.style.display = 'block';
                
                // Slight delay to trigger CSS fade-in
                setTimeout(() => {
                    appView.style.opacity = '1';
                }, 50);
            }, 600); // Matches the CSS transition time
        }

        // --- APP STORE LOGIC ---
        const searchInput = document.getElementById('search-input');
        const discoverSection = document.getElementById('discover-section');
        const resultsSection = document.getElementById('results-section');
        const loader = document.getElementById('loader');

        let typingTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            const query = searchInput.value.trim();
            
            if (query.length > 0) {
                discoverSection.style.display = 'none';
                resultsSection.style.display = 'none';
                loader.style.display = 'block';
                
                typingTimer = setTimeout(() => fetchApps(query), 500);
            } else {
                discoverSection.style.display = 'block';
                resultsSection.style.display = 'none';
                loader.style.display = 'none';
            }
        });

        function triggerSearch(term) {
            searchInput.value = term;
            searchInput.dispatchEvent(new Event('input'));
        }

        async function fetchApps(query) {
            try {
                // REAL API CALL:
                // const response = await fetch(`https://joel.com/api/appsearch?query=${encodeURIComponent(query)}`);
                // const apps = await response.json();
                
                // MOCK DATA:
                const apps = await mockApiCall(query); 
                renderApps(apps);
            } catch (error) {
                resultsSection.innerHTML = `<p style="text-align:center; color: #ff0a6c;">Network connection failed.</p>`;
            } finally {
                loader.style.display = 'none';
                resultsSection.style.display = 'block';
            }
        }

        function renderApps(apps) {
            resultsSection.innerHTML = ''; 

            if (apps.length === 0) {
                resultsSection.innerHTML = `<p style="text-align:center; color: #888894;">No results found.</p>`;
                return;
            }

            apps.forEach(app => {
                const appItem = document.createElement('div');
                appItem.className = 'app-item';
                
                appItem.innerHTML = `
                    <img src="${app.icon}" class="app-icon" alt="${app.name}">
                    <div class="app-info">
                        <div class="app-title">${app.name}</div>
                        <div class="app-subtitle">${app.subtitle}</div>
                    </div>
                    <button class="app-action-btn" onclick="downloadApp(event, '${app.name}')">GET</button>
                `;
                resultsSection.appendChild(appItem);
            });
        }

        async function downloadApp(event, appName) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "WAIT";
            btn.style.color = "var(--pink)";
            btn.style.borderColor = "var(--pink)";
            
            try {
                // REAL API CALL:
                // await fetch(`https://joel.com/api/appdownload?query=${encodeURIComponent(appName)}`);
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                btn.innerText = "DONE";
                btn.style.backgroundColor = "var(--cyan)";
                btn.style.color = "var(--bg-main)";
            } catch (error) {
                btn.innerText = "FAIL";
                btn.style.color = "var(--pink)";
            }
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style = "";
            }, 2500);
        }

        function mockApiCall(query) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve([
                        { name: "Photoroom: AI Photo", subtitle: "Erase backgrounds, edit images", icon: "https://ui-avatars.com/api/?name=P&background=ff0a6c&color=fff&size=128&rounded=true" },
                        { name: "InPulse Tracker", subtitle: "Log Blood Pressure & Oxygen", icon: "https://ui-avatars.com/api/?name=I&background=35eaff&color=121214&size=128&rounded=true" },
                        { name: "Hevy Gym Log", subtitle: "Weight Lifting Routine", icon: "https://ui-avatars.com/api/?name=H&background=2a2a35&color=35eaff&size=128&rounded=true" },
                        { name: `Result: "${query}"`, subtitle: "Data stream connected", icon: "https://ui-avatars.com/api/?name=R&background=ff0a6c&color=fff&size=128&rounded=true" }
                    ]);
                }, 600); 
            });
        }
    </script>
</body>
</html>
